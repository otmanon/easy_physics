<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <link rel="canonical" href="https://davicori.github.io/SIGGRAPH-Course-Physics/" />
    <meta http-equiv="refresh" content="0; url=https://davicori.github.io/SIGGRAPH-Course-Physics/" />
    <meta name="robots" content="noindex" />
    <script>
      // Preserve any sub-path / query / hash when forwarding.
      (function () {
        var base = "https://davicori.github.io/SIGGRAPH-Course-Physics/";
        var path = location.pathname.replace(/^\/easy_physics\/?/, "");
        location.replace(base + path + location.search + location.hash);
      })();
    </script>
  </head>
  <body>
    <p>
      This page has moved to
      <a href="https://davicori.github.io/SIGGRAPH-Course-Physics/">
        https://davicori.github.io/SIGGRAPH-Course-Physics/
      </a>
    </p>
  </body>
</html>
